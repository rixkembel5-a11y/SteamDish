<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Пароварка PRO</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial;
  background:#0b1220;
  color:#e5e7eb;
}
.header {
  padding:16px;
  font-size:20px;
  color:#38bdf8;
}
.card {
  margin:10px;
  padding:14px;
  background:#0f172a;
  border-radius:12px;
}
select, button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  font-size:16px;
}
.start { background:#22c55e; color:#000; }
.next { background:#38bdf8; }
.timer {
  font-size:34px;
  text-align:center;
  margin:15px 0;
}
</style>

</head>

<body>

<div class="header">🍲 Пароварка PRO</div>

<div class="card">
  <h2>Выбери рецепт</h2>
  <select id="recipeSelect" onchange="loadRecipe()">
    <option value="r1">Рис + всё</option>
    <option value="r2">Гречка + всё</option>
    <option value="r3">Рис + рыба</option>
  </select>
</div>

<div class="card">
  <h2>Текущий шаг</h2>
  <div id="stepText">Нажми «Старт»</div>
</div>

<div class="timer" id="timer">00:00</div>

<div style="text-align:center;">
  <button class="start" onclick="start()">Старт</button>
  <button class="next" onclick="nextStep()">Следующий шаг</button>
</div>

<audio id="beep" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>

// рецепты
const recipes = {
  r1: [
    { text: "НИЗ: рис + картошка", time: 20*60 },
    { text: "ВЕРХ: курица, рыба, котлеты", time: 20*60 },
    { text: "Готово 🎉", time: 0 }
  ],
  r2: [
    { text: "НИЗ: гречка + картошка", time: 15*60 },
    { text: "ВЕРХ: курица, рыба, котлеты", time: 20*60 },
    { text: "Готово 🎉", time: 0 }
  ],
  r3: [
    { text: "НИЗ: рис + картошка", time: 20*60 },
    { text: "ВЕРХ: рыба + котлеты", time: 15*60 },
    { text: "Готово 🎉", time: 0 }
  ]
};

let steps = recipes["r1"];
let current = 0;
let interval = null;

function loadRecipe(){
  const val = document.getElementById("recipeSelect").value;
  steps = recipes[val];
  current = 0;
  document.getElementById("stepText").innerText = "Нажми «Старт»";
  document.getElementById("timer").innerText = "00:00";
}

function start(){
  current = 0;
  runStep();
}

function nextStep(){
  current++;
  runStep();
}

function runStep(){
  clearInterval(interval);

  if(current >= steps.length) return;

  const step = steps[current];
  document.getElementById("stepText").innerText = step.text;

  let t = step.time;

  interval = setInterval(()=>{
    let m = Math.floor(t/60);
    let s = t%60;

    document.getElementById("timer").innerText =
      String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');

    if(t <= 0){
      clearInterval(interval);

      // звук
      const beep = document.getElementById("beep");
      beep.play();

      alert("Шаг завершён");
    }
    t--;
  },1000);
}

// service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
