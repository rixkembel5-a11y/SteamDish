<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Пароварка PRO</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial;
  background:#0b1220;
  color:#e5e7eb;
}
.header {
  padding:16px;
  font-size:20px;
  color:#38bdf8;
}
.card {
  margin:10px;
  padding:14px;
  background:#0f172a;
  border-radius:12px;
}
select, button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  font-size:16px;
}
.start { background:#22c55e; color:#000; }
.next { background:#38bdf8; }
.timer {
  font-size:36px;
  text-align:center;
  margin:15px 0;
}
</style>

</head>

<body>

<div class="header">🍲 Пароварка PRO</div>

<div class="card">
  <h2>Выбор рецепта</h2>
  <select id="recipeSelect" onchange="loadRecipe()">
    <option value="r1">Рис + всё</option>
    <option value="r2">Гречка + всё</option>
    <option value="r3">Рис + рыба</option>
    <option value="r4">Рис + курица + котлеты + брокколи (3 шага)</option>
  </select>
</div>

<div class="card">
  <h2>Шаг</h2>
  <div id="stepText">Нажми старт</div>
</div>

<div class="timer" id="timer">00:00</div>

<div style="text-align:center;">
  <button class="start" onclick="start()">Старт</button>
  <button class="next" onclick="nextStep()">Следующий</button>
</div>

<audio id="beep" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>

const recipes = {
r1: [
  {
    text: "НИЗ: рис + картошка",
    duration: 20*60*1000,
    alert: "Добавь верхний уровень"
  },
  {
    text: "ВЕРХ: курица, рыба, котлеты",
    duration: 20*60*1000,
    alert: "Готово 🎉"
  }
],
 r2: [
  {
    text: "НИЗ: гречка + картошка",
     duration: 15*60*1000 ,
    alert: "Добавь верхний уровень"
  },
  {
    text: "ВЕРХ: курица, рыба, котлеты",
     duration: 20*60*1000,
    alert: "Готово 🎉"
  }
], 
 r3: [
  {
    text:"НИЗ: рис + картошка",
     duration: 20*60*1000 ,
    alert: "Добавь верхний уровень"
  },
  {
    text: "ВЕРХ: рыба + котлеты",
     duration: 15*60*1000,
    alert: "Готово 🎉"
  }
], 
r4: [
  {
    text: "НИЗ: рис + курица",
    duration: 20*60*1000,
    alert: "Добавь котлеты"
  },
  {
    text: "ВЕРХ: готовятся котлеты",
    duration: 10*60*1000,
    alert: "Добавь брокколи"
  },
  {
    text: "Готовится брокколи",
    duration: 5*60*1000,
    alert: "Готово 🎉"
  }
]
};

let steps = recipes.r1;
let current = 0;
let startTime = 0;
let duration = 0;
let interval = null;

function loadRecipe() {
  const val = document.getElementById("recipeSelect").value;
  steps = recipes[val];
  current = 0;
  document.getElementById("stepText").innerText = "Нажми старт";
  document.getElementById("timer").innerText = "00:00";
}

function start() {
  current = 0;
  runStep();
}

function nextStep() {
  current++;
  runStep();
}

function runStep() {
  clearInterval(interval);

  if (current >= steps.length) return;

  const step = steps[current];
  document.getElementById("stepText").innerText = step.text;

  duration = step.duration;
  startTime = Date.now();

  if (duration === 0) {
    document.getElementById("timer").innerText = "00:00";
    return;
  }

  interval = setInterval(updateTimer, 250);
}

function updateTimer() {
  const elapsed = Date.now() - startTime;
  let remaining = duration - elapsed;

 if (remaining <= 0) {
  clearInterval(interval);
  document.getElementById("timer").innerText = "00:00";

  const step = steps[current];

  // звук
  document.getElementById("beep").play();

  // текстовое уведомление
  if (step.alert) {
    alert(step.alert);
  }

  return;
}

  let m = Math.floor(remaining / 60000);
  let s = Math.floor((remaining % 60000) / 1000);

  document.getElementById("timer").innerText =
    String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
}

// PWA service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
