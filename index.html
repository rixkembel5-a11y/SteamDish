<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Пароварка PRO</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial;
  background:#0b1220;
  color:#e5e7eb;
}
.header {
  padding:16px;
  font-size:20px;
  color:#38bdf8;
}
.card {
  margin:10px;
  padding:14px;
  background:#0f172a;
  border-radius:12px;
}
button {
  padding:10px 14px;
  margin:5px;
  border:none;
  border-radius:8px;
  font-size:16px;
}
.start { background:#22c55e; color:#000; }
.next { background:#38bdf8; }
.timer {
  font-size:32px;
  text-align:center;
  margin:15px 0;
}
</style>

</head>

<body>

<div class="header">🍲 Пароварка PRO</div>

<div class="card">
  <h2>Текущий шаг</h2>
  <div id="stepText">Нажми «Старт»</div>
</div>

<div class="timer" id="timer">00:00</div>

<div style="text-align:center;">
  <button class="start" onclick="start()">Старт</button>
  <button class="next" onclick="nextStep()">Следующий шаг</button>
</div>

<script>

const steps = [
  { text: "Запусти НИЗ: рис + картошка", time: 20*60 },
  { text: "Добавь ВЕРХ: курица, рыба, котлеты", time: 20*60 },
  { text: "Готово 🎉", time: 0 }
];

let current = 0;
let interval = null;

function start(){
  current = 0;
  runStep();
}

function nextStep(){
  current++;
  runStep();
}

function runStep(){
  clearInterval(interval);

  if(current >= steps.length) return;

  const step = steps[current];
  document.getElementById("stepText").innerText = step.text;

  let t = step.time;

  interval = setInterval(()=>{
    let m = Math.floor(t/60);
    let s = t%60;

    document.getElementById("timer").innerText =
      String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');

    if(t <= 0){
      clearInterval(interval);
      alert("Шаг завершён");
    }
    t--;
  },1000);
}

// регистрация service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
